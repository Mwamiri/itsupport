name: Deploy to Coolify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TEST BACKEND ────────────────────────────────────────────────────────────
  test-backend:
    name: Test Laravel Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: itsupport_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo_pgsql, mbstring, bcmath, gd, zip

      - name: Install dependencies
        working-directory: backend
        run: composer install --prefer-dist --no-progress

      - name: Copy env
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations
        working-directory: backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: itsupport_test
          DB_USERNAME: postgres
          DB_PASSWORD: password
        run: php artisan migrate --force

  # ── TEST FRONTEND ───────────────────────────────────────────────────────────
  test-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://api.placeholder.com

  # ── DEPLOY ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Coolify Deploy (Backend)
        run: |
          curl -X POST "${{ secrets.COOLIFY_BACKEND_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"

      - name: Trigger Coolify Deploy (Frontend)
        run: |
          curl -X POST "${{ secrets.COOLIFY_FRONTEND_WEBHOOK }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"
